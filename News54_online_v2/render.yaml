services:
  - type: web
    name: news54-web
    env: python
    plan: free
    buildCommand: pip install -r News54/requirements.txt && python News54/manage.py collectstatic --noinput
    startCommand: gunicorn News54.news_aggregator.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: news54-db
          property: connectionString

databases:
  - name: news54-db
    plan: free
