services:
  - type: web
    name: news54-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn news_aggregator.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: news54-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://news54-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: news54-db
          property: connectionString

  - type: cron
    name: news54-fetcher
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py fetch_news
    schedule: "*/30 * * * *"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: news54-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://news54-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: news54-db
          property: connectionString

databases:
  - name: news54-db
    plan: free
